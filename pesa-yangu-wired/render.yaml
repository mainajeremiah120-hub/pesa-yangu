# render.yaml — Render.com infrastructure definition
# Commit this to your repo root. Render auto-detects it.
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Express API ─────────────────────────────────────────────────────────────
  - type: web
    name: pesa-yangu-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true          # redeploys on every push to main
    plan: free                # upgrade to "starter" for always-on (no spin-down)
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pesa-yangu-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure random value
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 30d
      - key: ANTHROPIC_API_KEY
        sync: false           # you set this manually in the Render dashboard
      - key: FX_REFRESH_INTERVAL_HOURS
        value: "6"
      - key: RATE_LIMIT_MAX
        value: "200"
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGINS
        sync: false           # set manually: https://pesa-yangu.vercel.app,https://pesayangu.app

  # ── Run migrations on each deploy ───────────────────────────────────────────
  - type: worker
    name: pesa-yangu-migrate
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run migrate
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pesa-yangu-db
          property: connectionString

databases:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  - name: pesa-yangu-db
    databaseName: pesayangu
    user: pesayangu
    plan: free               # 1GB storage, upgrade when ready
